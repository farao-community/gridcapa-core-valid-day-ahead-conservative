spring:
  rabbitmq:
    host: localhost
    port: 5672
    username: gridcapa
    password: gridcapa
    template:
      reply-timeout: 6000000
  cloud:
    stream:
      bindings:
        task-status-update:
          binder: rabbit
          destination: task-status-updated

core-valid-day-ahead-conservative-runner:
  async-time-out: 600000 # 10min (10*60*1000)
  zone-id: "Europe/Paris"
  bindings:
    request:
      destination: core-valid-day-ahead-conservative-requests
      routing-key: "#"
  whitelist:
    - file:/
    - http://minio:9000/

core-valid-commons:
  core-hubs:
    - name: Autriche
      ramcep2-code: AT
      flowbased-code: PTDF_AT
      forecast-code: AT-CORE
      cluster-vertice-code: AT
      is-hvdc-hub: false
      is-ahc-hub: false
      coefficient: 1
